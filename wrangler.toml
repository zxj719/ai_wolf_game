name = "wolfgame"
main = "workers/auth/index.js"
compatibility_date = "2026-01-10"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "wolfgame-db"
database_id = "f54315ad-c129-41e4-a23d-82463488d315"

# KV 队列绑定（review pipeline 用）
# TODO (prerequisite): run the following commands to provision the namespace:
#   1. npx wrangler kv:namespace create "REVIEW_QUEUE" --env production
#   2. npx wrangler kv:namespace create "REVIEW_QUEUE"  (for local dev)
#   3. Replace the placeholder IDs below with the output IDs
# [[kv_namespaces]]
# binding = "REVIEW_QUEUE"
# id = "YOUR_PRODUCTION_NAMESPACE_ID"
# preview_id = "YOUR_PREVIEW_NAMESPACE_ID"

# 开发环境配置
[dev]
port = 8787
local_protocol = "http"

# 生产环境静态资产
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Chords cloud service (non-secret URL only)
# Set the shared auth token with:
#   npx.cmd wrangler secret put CHORDS_SERVICE_TOKEN
#
[vars]
# CHORDS_SERVICE_URL = "https://your-chords-service.example.com"
# ECS BT Server 公网地址（填入实际 IP，不带尾部斜杠）
# 例：ECS_BT_URL = "http://47.100.xxx.xxx"
ECS_BT_URL = "https://novel-origin.zhaxiaoji.com"
ECS_NOVEL_URL = "https://novel-origin.zhaxiaoji.com"
