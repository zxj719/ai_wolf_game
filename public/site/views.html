<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>观点索引 | Thinking Library</title>
    <meta name="description" content="A bilingual index of the essay's central arguments." />
    <link rel="stylesheet" href="assets/style.css" />
    <script>
      // 与主站 src/shell/theme.js THEME_STORAGE_KEY='wolfgame-theme' 同步：
      // 显式 light/dark 写 data-theme；system/缺省保持模块默认（light）。
      (function () {
        try {
          var p = localStorage.getItem('wolfgame-theme');
          if (p === 'light' || p === 'dark') {
            document.documentElement.setAttribute('data-theme', p);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="views-page" data-page="views">
    <header class="site-header">
      <div class="wrap">
        <div class="badge" data-copy="issue">第 01 期</div>
        <h1 class="site-title" id="views-title">观点索引</h1>
        <p class="site-subtitle" id="views-subtitle"></p>
        <nav class="nav" aria-label="Site navigation">
          <a href="/home" data-copy="home">返回首页</a>
          <a href="index.html" data-copy="libraryHome">图书馆首页</a>
          <a href="essay.html" data-copy="essay">阅读长文</a>
          <span class="language-switch" aria-label="Language">
            <button type="button" data-lang-set="zh" data-lang-label="chinese">中文</button>
            <button type="button" data-lang-set="en" data-lang-label="english">英文</button>
          </span>
        </nav>
      </div>
    </header>

    <main class="wrap">
      <section id="views-grid" class="argument-grid"></section>
    </main>

    <script src="assets/content.js"></script>
    <script src="assets/script.js"></script>
  </body>
</html>
