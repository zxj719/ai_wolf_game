<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>资料库 | Thinking Library</title>
    <meta name="description" content="A bilingual reader for edited Obsidian notes." />
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body class="reader-page" data-page="reader">
    <header class="reader-topbar">
      <a class="back-link" href="/home" data-copy="home">返回首页</a>
      <a class="back-link" href="index.html" data-copy="libraryHome">图书馆首页</a>
      <div class="reader-title" id="reader-title">资料库</div>
      <a class="back-link" id="raw-link" href="#" data-copy="raw">原始文件</a>
      <div class="language-switch" aria-label="Language">
        <button type="button" data-lang-set="zh" data-lang-label="chinese">中文</button>
        <button type="button" data-lang-set="en" data-lang-label="english">英文</button>
      </div>
    </header>

    <main class="reader-layout">
      <aside class="reader-nav" id="reader-nav" aria-label="Documents"></aside>
      <article class="markdown-reader reveal">
        <p class="archive-note" data-copy="archiveNote"></p>
        <div id="markdown-content" data-doc-default="obsidian-vault/00-index.md">
          <p data-copy="loading">正在载入...</p>
        </div>
      </article>
    </main>

    <script src="assets/content.js"></script>
    <script src="assets/script.js"></script>
  </body>
</html>
