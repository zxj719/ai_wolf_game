<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>把选择做成系统 | Thinking Library</title>
    <meta name="description" content="A bilingual magazine essay about attention, engineering, organizations, and life." />
    <link rel="stylesheet" href="assets/style.css" />
    <script>
      // 与主站 src/shell/theme.js THEME_STORAGE_KEY='wolfgame-theme' 同步：
      // 显式 light/dark 写 data-theme；system/缺省保持模块默认（light）。
      (function () {
        try {
          var p = localStorage.getItem('wolfgame-theme');
          if (p === 'light' || p === 'dark') {
            document.documentElement.setAttribute('data-theme', p);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="essay-page" data-page="essay">
    <header class="site-topbar">
      <a class="topbar-link" href="/home" data-copy="home">返回首页</a>
      <a class="topbar-link" href="index.html" data-copy="libraryHome">图书馆首页</a>
      <div class="topbar-title" data-copy="essay">阅读长文</div>
      <a class="topbar-link" href="views.html" data-copy="views">观点索引</a>
      <div class="language-switch" aria-label="Language">
        <button type="button" data-lang-set="zh" data-lang-label="chinese">中文</button>
        <button type="button" data-lang-set="en" data-lang-label="english">英文</button>
      </div>
    </header>

    <main class="magazine-layout">
      <aside class="essay-toc reveal" id="essay-toc" aria-label="Table of contents"></aside>
      <article class="magazine-article reveal" id="essay-root"></article>
    </main>

    <script src="assets/content.js"></script>
    <script src="assets/script.js"></script>
  </body>
</html>
