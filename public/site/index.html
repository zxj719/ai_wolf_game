<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>思考图书馆 | Thinking Library</title>
    <meta name="description" content="A bilingual magazine-style reading room for essays, arguments, and edited notes." />
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body class="home-page" data-page="home">
    <main class="desktop-shell">
      <section class="mac-window reveal" aria-label="Thinking Library">
        <header class="window-bar">
          <div class="traffic-lights" aria-hidden="true">
            <span class="close"></span>
            <span class="minimize"></span>
            <span class="zoom"></span>
          </div>
          <div class="window-title" data-copy="library">思考图书馆</div>
          <div class="toolbar-actions">
            <a href="/home" data-copy="home">返回首页</a>
            <a href="essay.html" data-copy="essay">阅读长文</a>
            <a href="views.html" data-copy="views">观点索引</a>
            <div class="language-switch" aria-label="Language">
              <button type="button" data-lang-set="zh" data-lang-label="chinese">中文</button>
              <button type="button" data-lang-set="en" data-lang-label="english">英文</button>
            </div>
          </div>
        </header>

        <div class="window-body">
          <aside class="finder-sidebar" aria-label="Library sections">
            <div class="sidebar-section">
              <div class="sidebar-label" data-copy="issue">第 01 期</div>
              <a class="sidebar-item active" href="index.html" data-copy="libraryHome">图书馆首页</a>
              <a class="sidebar-item" href="essay.html" data-copy="essay">阅读长文</a>
              <a class="sidebar-item" href="views.html" data-copy="views">观点索引</a>
            </div>
            <div class="sidebar-section">
              <div class="sidebar-label" data-copy="archive">资料库</div>
              <div id="archive-sidebar"></div>
            </div>
          </aside>

          <section class="library-main">
            <div id="home-cover"></div>
            <div id="home-feature-grid" class="feature-grid"></div>
            <section class="issue-map" aria-label="Issue structure">
              <h2 id="home-sections-title">本期结构</h2>
              <ol id="home-sections"></ol>
            </section>
          </section>
        </div>
      </section>
    </main>

    <script src="assets/content.js"></script>
    <script src="assets/script.js"></script>
  </body>
</html>
